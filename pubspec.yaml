name: ONYX
description: "ONYX"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  uuid: ^4.0.0
  
  permission_handler: ^11.3.1
  audioplayers: ^5.2.1
  http: ^1.5.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  web_socket_channel: ^3.0.2
  cryptography: ^2.5.0
  convert: ^3.1.2
  crypto: ^3.0.3
  network_info_plus: ^5.0.3
  http_parser: ^4.0.2
  
  audio_session: ^0.1.20
  flutter_dotenv: ^5.1.0
  
  path_provider: ^2.1.1
  record: ^6.1.2
  url_launcher: ^6.3.0
  just_audio: ^0.9.37
  just_audio_windows: ^0.2.0
  shared_preferences: ^2.1.0
  window_manager: ^0.4.0
  tray_manager: ^0.2.3
  launch_at_startup: ^0.3.1
  window_to_front: ^0.0.3
  file_picker: ^10.3.3
  cached_network_image: ^3.3.1
  desktop_drop: ^0.4.0



  flutter_cache_manager: ^3.3.1 

  gallery_saver_plus: ^3.2.9
  
  video_player: ^2.10.0    
  media_kit: ^1.1.10                  
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  visibility_detector: ^0.2.2 
  
  super_clipboard: ^0.9.1
  open_filex: ^4.7.0
  flutter_webrtc: ^1.2.1

  collection: ^1.18.0
  device_info_plus: ^11.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.0
  socks5_proxy: ^2.1.1

  photo_manager: ^3.8.3
  image_picker: ^1.2.1
  camera: ^0.10.5+3

  local_auth: ^2.3.0
  google_fonts: ^6.1.0
  image: ^4.0.17
  
  flutter_local_notifications: ^19.5.0
  workmanager: ^0.9.0+3
  flutter_foreground_task: ^9.2.0
  local_notifier: ^0.1.6
  desktop_multi_window: ^0.3.0
  liquid_glass_widgets: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# liquid_glass_widgets 0.11.0 требует meta ^1.17.0, но flutter_test из SDK
# пиннит meta на 1.16.0. meta — это только аннотации, поэтому форсим 1.17.0,
# чтобы оставить liquid_glass_widgets 0.11.0 с полными премиум-шейдерами.
dependency_overrides:
  meta: ^1.17.0



flutter:
  uses-material-design: true
  assets:
    - assets/onyx_icon.png
    - assets/onyx-512.png
    - assets/notification0.wav
    - assets/notification1.wav
    - assets/notification2.wav
    - assets/tray_icon.png
    - assets/tray_icon.ico
    - assets/certs/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/onyx-512.png"
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/onyx-512.png"
  windows:
    generate: true
    image_path: "assets/onyx-512.png"
  linux:
    generate: true
    image_path: "assets/onyx-512.png"
